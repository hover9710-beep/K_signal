# 매주 네이버 데이터랩(검색어 트렌드 + 쇼핑인사이트) 수집기를 실행하고
# 결과 json 을 레포의 data/ 에 커밋하는 워크플로.
name: weekly-collect

on:
  # 매주 월요일 00:00 UTC = 한국 시간(KST) 월요일 오전 9시에 실행.
  schedule:
    - cron: "0 0 * * 1"
  # 깃허브 UI/CLI 에서 수동으로도 실행할 수 있게 허용.
  workflow_dispatch:

# 결과 json 을 레포에 커밋/푸시해야 하므로 쓰기 권한이 필요하다.
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      # 1) 레포 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2) 파이썬 설치 (3.12)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3) 의존성 설치 (수집기는 외부 라이브러리로 dotenv 만 사용)
      - name: Install dependencies
        run: pip install python-dotenv

      # 4) 통합검색어 트렌드 수집
      #    인증키는 .env 가 아니라 GitHub Secrets 에서 환경변수로 주입한다.
      #    (load_dotenv() 는 이미 설정된 환경변수를 덮어쓰지 않으므로 안전)
      - name: Run datalab collector
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python datalab_collector.py

      # 5) 쇼핑인사이트 분야 트렌드 수집 (동일한 env)
      - name: Run shopping collector
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python shopping_collector.py

      # 6) data/ 변경분만 커밋·푸시 (변경 없으면 건너뜀)
      - name: Commit collected data
        run: |
          # 커밋 작성자 정보 설정 (GitHub Actions 봇)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 수집 결과(data/)만 스테이징
          git add data/

          # 스테이징된 변경이 없으면 커밋/푸시를 건너뛴다.
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋을 건너뜁니다."
          else
            # 커밋 메시지에 수집 날짜(UTC 기준 YYYY-MM-DD) 포함
            COLLECT_DATE="$(date -u +%Y-%m-%d)"
            git commit -m "data: weekly collect ${COLLECT_DATE}"
            git push
          fi
